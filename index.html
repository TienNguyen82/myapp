<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>TEST GITHUB PAGES</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      text-align: center;
      padding: 30px;
      border-radius: 20px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h1 {
      margin-bottom: 10px;
      font-size: 28px;
    }

    p {
      opacity: 0.8;
    }

    .time {
      margin-top: 20px;
      font-size: 18px;
      color: yellow;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>🚀 TEST OK</h1>
  <p>Nếu bạn thấy màn này → GitHub Pages đã cập nhật đúng</p>
  <div class="time" id="time"></div>
</div>

<script>
  // Hiển thị thời gian realtime để chắc chắn không cache
  function updateTime() {
    const now = new Date();
    document.getElementById("time").innerText =
      "Time: " + now.toLocaleTimeString();
  }

  setInterval(updateTime, 1000);
  updateTime();
</script>

</body>
</html>

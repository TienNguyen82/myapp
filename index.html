<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bàn Cát test</title>

  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#0f1115" />

  <style>
    :root{
      --bg:#0f1115;
      --panel:#171a21;
      --panel2:#1b2130;
      --border:#2d3443;
      --text:#ffffff;
      --muted:#a9b1c2;
      --primary:#5da9ff;
      --ok:#39d98a;
      --warn:#ffb95d;
      --danger:#ff7387;
      --radius:18px;
      --shadow:0 10px 25px rgba(0,0,0,.28);
    }
    *{box-sizing:border-box}
    body{
      <div style="color:red;font-size:30px">TEST-999</div>
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:linear-gradient(180deg,#0d1016,#111621 40%,#0f1115);
      color:var(--text);
    }
    .app{
      max-width:860px;
      margin:0 auto;
      padding:16px 14px 28px;
    }
    .topbar{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
    }
    .title-wrap h1{
      margin:0;
      font-size:26px;
      line-height:1.15;
    }
    .subtitle{
      color:var(--muted);
      margin-top:6px;
      font-size:13px;
    }
    .status-pill{
      white-space:nowrap;
      background:#1f2a3b;
      color:#d8e6ff;
      border:1px solid #30435f;
      border-radius:999px;
      padding:9px 12px;
      font-size:12px;
      font-weight:700;
    }
    .tabs{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
      margin-bottom:14px;
    }
    .tab{
      border:none;
      border-radius:14px;
      padding:12px 10px;
      background:#212734;
      color:#d7deed;
      font-weight:700;
      font-size:14px;
      border:1px solid #303849;
    }
    .tab.active{
      background:linear-gradient(180deg,#5da9ff,#468cf0);
      color:white;
      border-color:transparent;
    }
    .page{display:none}
    .page.active{display:block}
    .card{
      background:rgba(23,26,33,.96);
      border:1px solid var(--border);
      border-radius:var(--radius);
      padding:16px;
      box-shadow:var(--shadow);
      margin-bottom:14px;
    }
    .card h2{
      margin:0 0 12px;
      font-size:18px;
    }
    .grid-2{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:12px;
    }
    .btn{
      width:100%;
      border:none;
      border-radius:14px;
      padding:15px 14px;
      font-size:15px;
      font-weight:700;
      color:#fff;
      background:#31384a;
      border:1px solid #3a4357;
    }
    .btn.primary{background:linear-gradient(180deg,#5da9ff,#468cf0)}
    .btn.ok{background:linear-gradient(180deg,#39d98a,#26ba72)}
    .btn.warn{background:linear-gradient(180deg,#ffb95d,#f79c27)}
    .btn.danger{background:linear-gradient(180deg,#ff7387,#ef4e68)}
    .btn.dark{background:#242a37}
    .btn:disabled{opacity:.55}
    .row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .label{
      color:var(--muted);
      font-size:14px;
      margin-bottom:6px;
    }
    .value{
      color:var(--text);
      font-weight:600;
      word-break:break-word;
    }
    .small{
      font-size:12px;
      color:var(--muted);
    }
    input[type="range"]{
      width:100%;
      accent-color:var(--primary);
    }
    select{
      width:100%;
      background:#202634;
      color:#fff;
      border:1px solid #394255;
      border-radius:12px;
      padding:12px;
      font-size:15px;
      outline:none;
    }
    .pattern-list{
      display:grid;
      gap:10px;
    }
    .pattern-item{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      background:#1b2130;
      border:1px solid #31384a;
      border-radius:14px;
      padding:12px;
    }
    .pattern-name{
      font-size:15px;
      font-weight:600;
      word-break:break-word;
    }
    .empty{
      text-align:center;
      color:var(--muted);
      padding:18px 8px;
    }
    .footer-note{
      margin-top:18px;
      text-align:center;
      color:var(--muted);
      font-size:13px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="title-wrap">
        <h1>Bàn Cát</h1>
        <div class="subtitle">Bảng điều khiển API trên Pi</div>
      </div>
      <div class="status-pill" id="grblStatus">Đang tải...</div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="control">Điều khiển</button>
      <button class="tab" data-tab="led">LED</button>
      <button class="tab" data-tab="patterns">Mẫu vẽ</button>
    </div>

    <section id="control" class="page active">
      <div class="card">
        <h2>Điều khiển máy</h2>
        <div class="grid-2">
          <button class="btn ok" onclick="callApi('/grbl/home')">VỀ GỐC</button>
          <button class="btn primary" onclick="callApi('/grbl/unlock')">MỞ KHÓA</button>
          <button class="btn warn" onclick="callApi('/pattern/pause')">TẠM DỪNG</button>
          <button class="btn primary" onclick="callApi('/pattern/resume')">TIẾP TỤC</button>
          <button class="btn danger" onclick="callApi('/pattern/stop')" style="grid-column:1/-1;">DỪNG</button>
        </div>
      </div>

      <div class="card">
        <h2>Trạng thái máy</h2>
        <div class="row">
          <div>
            <div class="label">Phản hồi GRBL</div>
            <div class="value" id="statusText">--</div>
          </div>
          <button class="btn dark" style="max-width:170px" onclick="refreshStatus()">LÀM MỚI</button>
        </div>
      </div>
    </section>

    <section id="led" class="page">
      <div class="card">
        <h2>Nguồn LED</h2>
        <div class="grid-2">
          <button class="btn ok" onclick="callApi('/led/on')">BẬT LED</button>
          <button class="btn danger" onclick="callApi('/led/off')">TẮT LED</button>
        </div>
      </div>

      <div class="card">
        <h2>Hiệu ứng</h2>
        <div class="label">WLED Effect</div>
        <select id="effectSelect"></select>
      </div>

      <div class="card">
        <h2>Độ sáng</h2>
        <div class="row">
          <span class="label">Giá trị</span>
          <span class="value" id="brightnessValue">128</span>
        </div>
        <input id="brightnessSlider" type="range" min="0" max="255" value="128" />
      </div>

      <div class="card">
        <h2>Tốc độ</h2>
        <div class="row">
          <span class="label">Giá trị</span>
          <span class="value" id="speedValue">128</span>
        </div>
        <input id="speedSlider" type="range" min="0" max="255" value="128" />
      </div>

      <div class="card">
        <h2>Cường độ</h2>
        <div class="row">
          <span class="label">Giá trị</span>
          <span class="value" id="intensityValue">128</span>
        </div>
        <input id="intensitySlider" type="range" min="0" max="255" value="128" />
      </div>
    </section>

    <section id="patterns" class="page">
      <div class="card">
        <div class="row">
          <h2 style="margin:0">Mẫu vẽ</h2>
          <button class="btn dark" style="max-width:170px" onclick="loadPatterns()">LÀM MỚI</button>
        </div>
      </div>

      <div class="pattern-list" id="patternList">
        <div class="card empty">Đang tải mẫu vẽ...</div>
      </div>
    </section>

    <div class="footer-note">Bộ điều khiển DIY cho bàn cát</div>
  </div>

<script>

// ===== FIX BASE URL =====
const IS_GITHUB = location.hostname.includes("github.io");
const BASE_URL = IS_GITHUB ? "http://192.168.4.1:5000" : "";

// ===== TAB SWITCH =====
document.querySelectorAll(".tab").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById(btn.dataset.tab).classList.add("active");
  });
});

// ===== SAFE FETCH =====
async function safeFetch(url, options){
  const res = await fetch(BASE_URL + url, options);
  const text = await res.text();

  if (text.startsWith("<!DOCTYPE")) {
    throw new Error("Sai API (đang gọi Git thay vì Pi)");
  }

  try {
    return JSON.parse(text);
  } catch {
    return text;
  }
}

// ===== API =====
async function callApi(path, options){
  try{
    const res = await safeFetch(path, options);
    if(document.getElementById("statusText")){
      document.getElementById("statusText").innerText =
        typeof res === "string" ? res : JSON.stringify(res);
    }
  }catch(e){
    console.log(e);
  }
}

// ===== STATUS =====
async function refreshStatus(){
  try{
    const res = await safeFetch("/status");
    if(document.getElementById("statusText")){
      document.getElementById("statusText").innerText =
        typeof res === "string" ? res : JSON.stringify(res);
    }
  }catch{}
}
setInterval(refreshStatus, 3000);
refreshStatus();

// ===== LED =====
async function loadEffects(){
  const select = document.getElementById("effectSelect");
  if(!select) return;

  try{
    const data = await safeFetch("/led/effects");
    select.innerHTML = "";

    data.forEach((e,i)=>{
      const opt = document.createElement("option");
      opt.value = i;
      opt.textContent = i + " - " + e;
      select.appendChild(opt);
    });

  }catch{
    select.innerHTML = "<option>Error</option>";
  }
}

if(document.getElementById("effectSelect")){
  document.getElementById("effectSelect").addEventListener("change", function(){
    callApi("/led/effect?id=" + this.value);
  });
}

loadEffects();

// ===== PATTERN =====
async function loadPatterns(){
  const container = document.getElementById("patternList");
  if(!container) return;

  container.innerHTML = "Loading...";

  try{
    const data = await safeFetch("/pattern/list");

    container.innerHTML = "";

    data.forEach(name=>{
      const div = document.createElement("div");

      div.innerHTML =
        "<div class='pattern-item'>" +
        "<span>" + name + "</span>" +
        "<button class='btn primary'>RUN</button>" +
        "</div>";

      div.querySelector("button").onclick = ()=>{
        callApi("/pattern/run?name=" + encodeURIComponent(name));
      };

      container.appendChild(div);
    });

  }catch{
    container.innerHTML = "Error";
  }
}

// ===== WIFI =====
async function scanWifi(){
  const select = document.getElementById("wifiSelect");
  const status = document.getElementById("wifiCurrent");

  if(!select || !status) return;

  select.innerHTML = "Scanning...";

  try{
    const data = await safeFetch("/wifi/scan");

    status.innerText = data.current_ssid || "Chưa kết nối";

    select.innerHTML = "";

    data.networks.forEach(n=>{
      const opt = document.createElement("option");
      opt.value = n.ssid;
      opt.textContent = n.ssid;
      select.appendChild(opt);
    });

  }catch{
    status.innerText = "Error";
  }
}

async function connectWifi(){
  const ssid = document.getElementById("wifiSelect").value;
  const password = document.getElementById("wifiPassword").value;

  await fetch(BASE_URL + "/wifi/connect", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ssid: ssid, password: password})
  });
}

// ===== INIT =====
loadPatterns();
scanWifi();

</script>
</body>
</html>
